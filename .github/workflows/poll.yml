name: ChargePoint Poller

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes (may be delayed slightly on busy runners)
  workflow_dispatch:

jobs:
  run-poller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run poller once
        env:
          CHARGEPOINT_USER: ${{ secrets.CHARGEPOINT_USER }}
          CHARGEPOINT_PASS: ${{ secrets.CHARGEPOINT_PASS }}
          CHARGEPOINT_SESSION_TOKEN: ${{ secrets.CHARGEPOINT_SESSION_TOKEN }}
          CHARGEPOINT_STATION_IDS: ${{ secrets.CHARGEPOINT_STATION_IDS }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
        run: python poller.py
